name: Snowflake Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SnowSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          
          # Download the official SnowSQL bootstrap installer script
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-1.3.0-linux_x86_64.bash
          
          # Run the installer in batch mode (creates the snowsql binary)
          SNOWSQL_DEST=~/.local/bin SNOWSQL_LOGIN_SHELL=~/.profile bash snowsql-1.3.0-linux_x86_64.bash
          
          # Add SnowSQL to the GitHub Actions PATH for subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run SQL in Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          # Use a heredoc to perfectly preserve the key's formatting and newlines
          cat << 'EOF' > rsa_key.pem
          ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          EOF
          
          chmod 600 rsa_key.pem
          
          snowsql \
            -a "$SNOWFLAKE_ACCOUNT" \
            -u "$SNOWFLAKE_USER" \
            -r "$SNOWFLAKE_ROLE" \
            --private-key-path rsa_key.pem \
            -f sql/deploy.sql
